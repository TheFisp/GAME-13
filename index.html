<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Quiz - 8 Levels</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Overlay Iniziale */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #start-btn {
            padding: 20px 60px;
            font-size: 1.8rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #6200ea;
            color: white;
            transition: 0.3s;
        }

        #start-btn:hover { background: #3700b3; transform: scale(1.05); }

        /* Container Gioco */
        #game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: filter 0.5s ease;
        }

        .blur { filter: blur(25px); }

        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: background-color 0.3s;
        }

        #game-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        #github-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #bb86fc;
            text-decoration: none;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #2c2c2c;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        #game-name-display {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            display: none;
            color: #03dac6;
        }

        /* Feedback */
        .correct-bg { background-color: #1b5e20 !important; }
        .wrong-bg { background-color: #b71c1c !important; }

        #round-info {
            position: absolute;
            top: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">INIZIA</button>
    </div>

    <div id="game-wrapper" class="blur">
        <div id="round-info">Round: 1 / 8</div>
        
        <div class="card" id="main-card">
            <a id="github-link" href="INSERISCI_QUI_IL_TUO_LINK_GITHUB_GENERALE" target="_blank">View Project on GitHub</a>
            <img id="game-image" src="" alt="Quiz Image">
            <input type="text" id="answer-input" placeholder="Qual è il gioco?" autocomplete="off">
            <div id="game-name-display"></div>
        </div>
    </div>

    <script>
        const gameData = [
            { answer: "minecraft", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065745.png", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065755.png" },
            { answer: "minecraft", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20070141.png", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20070149.png" },
            { answer: "elden ring", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065839.png", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065844.png" },
            { answer: "stardew valley", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065859.png", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065910.png" },
            { answer: "little nightmares", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065922.png", originalImg: "LINK_FOTO_ORIGINALE_5" },
            { answer: "little nightmares 2", img: "LINK_FOTO_6", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065929.png" },
            { answer: "undertale", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20070019.png", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20070029.png" },
            { answer: "terraria", img: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065812.png", originalImg: "https://github.com/TheFisp/GAME-13/blob/main/Screenshot%202026-04-25%20065818.png" }
        ];

        let currentRound = 0;
        const overlay = document.getElementById('overlay');
        const wrapper = document.getElementById('game-wrapper');
        const imgEl = document.getElementById('game-image');
        const inputEl = document.getElementById('answer-input');
        const nameEl = document.getElementById('game-name-display');
        const cardEl = document.getElementById('main-card');
        const roundEl = document.getElementById('round-info');

        document.getElementById('start-btn').onclick = () => {
            overlay.style.display = 'none';
            wrapper.classList.remove('blur');
            loadLevel();
        };

        function loadLevel() {
            if (currentRound < gameData.length) {
                const data = gameData[currentRound];
                imgEl.src = data.img;
                roundEl.innerText = `Round: ${currentRound + 1} / 8`;
                inputEl.value = "";
                inputEl.style.display = "block";
                nameEl.style.display = "none";
                cardEl.classList.remove('correct-bg', 'wrong-bg');
                inputEl.focus();
            } else {
                alert("Complimenti! Hai finito il quiz.");
                location.reload();
            }
        }

        inputEl.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const guess = inputEl.value.toLowerCase().trim();
                const correct = gameData[currentRound].answer.toLowerCase();

                if (guess === correct) {
                    // RISPOSTA CORRETTA
                    cardEl.classList.add('correct-bg');
                    imgEl.src = gameData[currentRound].originalImg; // Mostra foto originale
                    nameEl.innerText = gameData[currentRound].answer.toUpperCase(); // Mostra nome
                    nameEl.style.display = "block";
                    inputEl.style.display = "none";

                    setTimeout(() => {
                        currentRound++;
                        loadLevel();
                    }, 2500); // Aspetta 2.5 secondi prima del prossimo round
                } else {
                    // RISPOSTA SBAGLIATA
                    cardEl.classList.add('wrong-bg');
                    inputEl.value = "";
                    setTimeout(() => {
                        cardEl.classList.remove('wrong-bg');
                    }, 600);
                }
            }
        };
    </script>
</body>
</html>
